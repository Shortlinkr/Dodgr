<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodgr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.15);
        }
        canvas {
            background: #070708;
            border: 1px solid #1a1a1a;
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }
        #game-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
            color: white;
            z-index: 10;
        }
        .menu-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 5, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 40px;
        }
        .hidden { display: none !important; }
        .neon-text {
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
            animation: flicker 3s infinite alternate;
        }
        .btn {
            pointer-events: auto;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 14px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }
        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.05);
        }
        .diff-btn {
            pointer-events: auto;
            border: 1px solid #333;
            padding: 6px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .diff-btn.active {
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .diff-btn.active.nightmare {
            border-color: #ff0000;
            color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        #blast-control {
            pointer-events: auto;
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            border: 2px solid #ff00ff;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.05);
            color: #ff00ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.3s;
            opacity: 0.2;
        }
        #blast-control.ready {
            opacity: 1;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            background: rgba(255, 0, 255, 0.2);
            cursor: pointer;
        }
        .stat-value {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        .pop { transform: scale(1.4); }
        #star-timer-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #star-timer-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fff, #ffd700, #fff);
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-menu" class="menu-screen">
            <h1 class="text-6xl font-black neon-text mb-2 italic tracking-tighter">NEON<br>DODGE</h1>
            
            <div id="difficulty-selector" class="flex gap-2 mb-10 mt-4">
                <button class="diff-btn" onclick="setDifficulty('easy')">Easy</button>
                <button class="diff-btn active" onclick="setDifficulty('normal')">Normal</button>
                <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
                <button class="diff-btn" onclick="setDifficulty('nightmare')">Nightmare</button>
            </div>

            <div class="space-y-1 mb-8">
                <p id="diff-desc" class="text-cyan-300 text-xs font-bold tracking-widest uppercase">Normal Difficulty Active</p>
                <p class="text-white opacity-40 text-[10px]">Adjust logic settings above</p>
            </div>

            <button class="btn" id="start-btn" onclick="startGame()">START_SESSION</button>
        </div>

        <div id="ui-layer" class="hidden">
            <div class="flex justify-between items-start">
                <div>
                    <div class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-black">Data_Score</div>
                    <div id="score-val" class="text-4xl font-black text-cyan-400 stat-value">0</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-black">Threat_Level</div>
                    <div id="level-val" class="text-2xl font-black text-purple-500 stat-value">1</div>
                </div>
            </div>
            <div id="star-timer-bar" class="hidden">
                <div id="star-timer-fill"></div>
            </div>
            <div id="blast-control" onclick="triggerBlast()">
                <span id="blast-count" class="text-2xl font-black">0</span>
                <span class="tracking-[0.2em] font-bold">BLAST</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
/** * AUDIO ASSETS CONFIGURATION
 * Link your GitHub paths here
 */
const BASE_URL = "shortlinkr/Dodgr/audio/";

const SOUND_PATHS = {
    // Shield
    shieldActivation: BASE_URL + "shield_pulse.mp3",
    shieldAmbient: BASE_URL + "shield_loop.mp3",
    shieldBreak: BASE_URL + "shield_shatter.mp3",
    
    // Time Warp
    timeActivation: BASE_URL + "time_warp_start.mp3",
    timeAmbient: BASE_URL + "time_warp_loop.mp3",
    timeExpiration: BASE_URL + "time_warp_end.mp3",
    
    // Star Mode
    starPickup: BASE_URL + "star_pickup.mp3",
    starActivation: BASE_URL + "star_burst.mp3",
    starAmbient: BASE_URL + "star_loop.mp3",
    starWarning: BASE_URL + "star_beep.mp3",
    starCollapse: BASE_URL + "star_collapse.mp3",
    
    // Blast
    blastPickup: BASE_URL + "blast_pickup.mp3",
    blastExplosion: BASE_URL + "blast_shockwave.mp3",
    enemyVaporize: BASE_URL + "enemy_vaporize.mp3",
    
    // Enemies
    enemySpawn: BASE_URL + "enemy_spawn.mp3",
    universalDeath: BASE_URL + "death.mp3",
    rainbowSpawn: BASE_URL + "rainbow_spawn.mp3",
    stalkerSpawn: BASE_URL + "stalker_spawn.mp3",
    laserWarning: BASE_URL + "laser_warning.mp3",
    laserFire: BASE_URL + "laser_fire.mp3",
    
    // Extra
    levelUp: BASE_URL + "level_up.mp3",
    uiHover: BASE_URL + "tick.mp3",
    scoreGain: BASE_URL + "score_up.mp3",
    pause: BASE_URL + "pause.mp3",
    click: BASE_URL + "click.mp3",
    bgm: BASE_URL + "background_music.mp3"
};

class SoundManager {
    constructor() {
        this.sounds = {};
        this.loops = {};
        this.enabled = false;
    }

    init() {
        if (this.enabled) return;
        this.enabled = true;
        // Pre-create audio objects (optional, they will load on play)
        Object.keys(SOUND_PATHS).forEach(key => {
            const audio = new Audio(SOUND_PATHS[key]);
            audio.preload = "auto";
            this.sounds[key] = audio;
        });
        
        // Start background music
        this.playLoop('bgm', 0.4);
    }

    play(key, volume = 1.0) {
        if (!this.enabled) return;
        const sound = new Audio(SOUND_PATHS[key]);
        sound.volume = volume;
        sound.play().catch(() => {}); // Catch browser auto-play blocks
    }

    playLoop(key, volume = 1.0) {
        if (!this.enabled || this.loops[key]) return;
        const sound = new Audio(SOUND_PATHS[key]);
        sound.volume = volume;
        sound.loop = true;
        sound.play().catch(() => {});
        this.loops[key] = sound;
    }

    stopLoop(key) {
        if (this.loops[key]) {
            this.loops[key].pause();
            this.loops[key].currentTime = 0;
            delete this.loops[key];
        }
    }
}

const SFX = new SoundManager();

/** * CONFIG & CONSTANTS
 */
const CONFIG = {
    WIDTH: 400,
    HEIGHT: 600,
    PLAYER_SPEED: 500,
    PLAYER_WIDTH: 44,
    PLAYER_HEIGHT: 12,
    OBJECT_MIN_SIZE: 16,
    OBJECT_MAX_SIZE: 32,
    COLORS: {
        PLAYER: '#00ffff',
        SHIELD: '#00ff44',
        TIME: '#f0ff00',
        GOLD: '#ffcc00',
        BLAST: '#ff00ff',
        STAR: '#ffffff',
        ENEMY: '#ff2d55',
        BEAM: '#ff0000',
        STALKER: '#ffaa00', 
        RAINBOW: 'linear'   
    }
};

const DIFFICULTY_SETTINGS = {
    easy: { spawnRateMult: 0.7, powerUpChance: 0.22, starEnabled: true, desc: "Low density traffic. High resources.", theme: '#00ffff' },
    normal: { spawnRateMult: 1.0, powerUpChance: 0.16, starEnabled: true, desc: "Standard operational protocol.", theme: '#00ffff' },
    hard: { spawnRateMult: 1.35, powerUpChance: 0.12, starEnabled: true, desc: "Aggressive hostile response.", theme: '#ff8800' },
    nightmare: { spawnRateMult: 2.1, powerUpChance: 0.08, starEnabled: false, desc: "CORE FAILURE IMMINENT. NO STAR SUPPORT.", theme: '#ff0000' }
};

let currentDiff = 'normal';

function setDifficulty(diff) {
    currentDiff = diff;
    const settings = DIFFICULTY_SETTINGS[diff];
    const descEl = document.getElementById('diff-desc');
    descEl.textContent = settings.desc;
    descEl.style.color = settings.theme;
    SFX.play('uiHover', 0.3);
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.classList.remove('active', 'nightmare');
        if (btn.textContent.toLowerCase() === diff) {
            btn.classList.add('active');
            if (diff === 'nightmare') btn.classList.add('nightmare');
        }
    });
}

const randRange = (min, max) => Math.random() * (max - min) + min;
const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

/** * CLASSES
 */
class Player {
    constructor() {
        this.width = CONFIG.PLAYER_WIDTH;
        this.height = CONFIG.PLAYER_HEIGHT;
        this.x = CONFIG.WIDTH / 2 - this.width / 2;
        this.y = CONFIG.HEIGHT - 70;
        this.speed = CONFIG.PLAYER_SPEED;
        this.moveLeft = false;
        this.moveRight = false;
        this.isAlive = true;
        this.hasShield = false;
        this.shieldTimer = 0;
        this.timeWarpTimer = 0;
        this.starTimer = 0;
        this.blasts = 0;
        this.trail = [];
    }

    update(dt) {
        if (!this.isAlive) return;

        if (this.moveLeft) this.x -= this.speed * dt;
        if (this.moveRight) this.x += this.speed * dt;
        this.x = clamp(this.x, 0, CONFIG.WIDTH - this.width);

        this.trail.push({ x: this.x, y: this.y, life: 1.0 });
        if (this.trail.length > 12) this.trail.shift();
        this.trail.forEach(t => t.life -= dt * 4);
        this.trail = this.trail.filter(t => t.life > 0);

        // Shield Logic
        if (this.shieldTimer > 0) {
            this.shieldTimer -= dt;
            SFX.playLoop('shieldAmbient', 0.4);
        } else {
            if (this.hasShield) SFX.play('shieldBreak');
            this.hasShield = false;
            SFX.stopLoop('shieldAmbient');
        }

        // Time Warp Logic
        if (this.timeWarpTimer > 0) {
            this.timeWarpTimer -= dt;
            SFX.playLoop('timeAmbient', 0.5);
            if (this.timeWarpTimer <= 0) SFX.play('timeExpiration');
        } else {
            SFX.stopLoop('timeAmbient');
        }
        
        // Star Logic
        if (this.starTimer > 0) {
            this.starTimer -= dt;
            SFX.playLoop('starAmbient', 0.6);
            if (this.starTimer < 3 && this.starTimer > 0) SFX.play('starWarning', 0.3);
            if (this.starTimer <= 0) {
                SFX.stopLoop('starAmbient');
                SFX.play('starCollapse');
            }

            const bar = document.getElementById('star-timer-bar');
            const fill = document.getElementById('star-timer-fill');
            if (bar && fill) {
                bar.classList.remove('hidden');
                fill.style.width = `${(this.starTimer / 30) * 100}%`;
            }
        } else {
            document.getElementById('star-timer-bar')?.classList.add('hidden');
        }

        const blastCount = document.getElementById('blast-count');
        const blastBtn = document.getElementById('blast-control');
        if (blastCount) blastCount.textContent = this.blasts;
        if (blastBtn) {
            if (this.blasts > 0) blastBtn.classList.add('ready');
            else blastBtn.classList.remove('ready');
        }
    }

    draw(ctx) {
        if (!this.isAlive) return;
        this.trail.forEach((t) => {
            ctx.globalAlpha = t.life * 0.3;
            ctx.fillStyle = (currentDiff === 'nightmare') ? '#ff3300' : CONFIG.COLORS.PLAYER;
            ctx.fillRect(t.x, t.y, this.width, this.height);
        });
        ctx.globalAlpha = 1.0;
        ctx.save();
        const isInvincible = this.starTimer > 0;
        ctx.shadowBlur = isInvincible ? 25 : 15;
        ctx.shadowColor = isInvincible ? '#fff' : ((currentDiff === 'nightmare') ? '#ff0000' : CONFIG.COLORS.PLAYER);
        ctx.fillStyle = isInvincible ? `hsl(${Date.now() % 360}, 100%, 70%)` : ((currentDiff === 'nightmare') ? '#ff3333' : CONFIG.COLORS.PLAYER);
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, 2);
        ctx.fill();
        ctx.restore();
        if (this.hasShield && !isInvincible) {
            ctx.save();
            ctx.shadowColor = CONFIG.COLORS.SHIELD;
            ctx.strokeStyle = CONFIG.COLORS.SHIELD;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/1.1, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
    }
}

class FallingObject {
    constructor(type = 'enemy', speedMult = 1) {
        this.type = type;
        this.size = type === 'rainbow' ? 48 : randRange(CONFIG.OBJECT_MIN_SIZE, CONFIG.OBJECT_MAX_SIZE);
        this.x = randRange(0, CONFIG.WIDTH - this.size);
        this.y = -this.size;
        this.speed = randRange(160, 300) * speedMult;
        this.color = CONFIG.COLORS[type.toUpperCase()] || CONFIG.COLORS.ENEMY;
        this.isPowerUp = !['enemy', 'ghost', 'stalker', 'rainbow'].includes(type);
        this.hue = 0; 
        this.rot = 0;

        // Spawn Sounds
        if (type === 'rainbow') SFX.play('rainbowSpawn');
        else if (type === 'stalker') SFX.play('stalkerSpawn');
        else if (!this.isPowerUp) SFX.play('enemySpawn', 0.2);
    }

    update(dt, player, isTimeWarped) {
        const effectiveDt = isTimeWarped ? dt * 0.35 : dt;
        this.rot += dt * 2;
        if (this.type === 'stalker') {
            const targetX = player.x + player.width/2 - this.size/2;
            this.x += (targetX - this.x) * (effectiveDt * 1.8);
            this.y += this.speed * 0.75 * effectiveDt;
        } else {
            this.y += this.speed * effectiveDt;
        }
        if (this.type === 'rainbow') this.hue = (this.hue + 120 * dt) % 360;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.rot);
        ctx.shadowBlur = 15;
        if (this.type === 'rainbow') {
            ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
            ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        } else {
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
        }
        if (this.isPowerUp) {
            if (this.type === 'star') this.drawStar(ctx, 0, 0, 5, this.size/2, this.size/4);
            else {
                ctx.beginPath(); ctx.arc(0, 0, this.size/2, 0, Math.PI * 2); ctx.fill();
                ctx.rotate(-this.rot); ctx.fillStyle = 'black'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const chars = { shield: 'S', time: 'T', gold: '$', blast: 'B' };
                ctx.fillText(chars[this.type] || '?', 0, 0);
            }
        } else {
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            if (this.type === 'ghost') ctx.globalAlpha = 0.4;
            ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }

    drawStar(ctx, cx, cy, spikes, outer, inner) {
        let rot = Math.PI / 2 * 3; let x = cx; let y = cy; let step = Math.PI / spikes;
        ctx.beginPath(); ctx.moveTo(cx, cy - outer);
        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outer; y = cy + Math.sin(rot) * outer; ctx.lineTo(x, y);
            rot += step; x = cx + Math.cos(rot) * inner; y = cy + Math.sin(rot) * inner; ctx.lineTo(x, y); rot += step;
        }
        ctx.lineTo(cx, cy - outer); ctx.closePath(); ctx.fill();
    }

    collides(player) {
        if (!player.isAlive) return false;
        return !(this.x > player.x + player.width || this.x + this.size < player.x || this.y > player.y + player.height || this.y + this.size < player.y);
    }
}

class BeamCube {
    constructor() {
        this.width = 60;
        this.x = randRange(0, CONFIG.WIDTH - this.width);
        this.state = 'WARNING'; 
        this.timer = currentDiff === 'nightmare' ? 1.0 : 1.6; 
        this.pulse = 0;
        SFX.play('laserWarning', 0.6);
    }
    update(dt) {
        this.timer -= dt;
        if (this.state === 'WARNING') {
            this.pulse += dt * 15;
            if (this.timer <= 0) { 
                this.state = 'FIRING'; 
                this.timer = currentDiff === 'nightmare' ? 3.5 : 2.5; 
                SFX.play('laserFire', 0.8);
            }
        } else if (this.state === 'FIRING') {
            if (this.timer <= 0) this.state = 'DONE';
        }
    }
    draw(ctx) {
        ctx.save();
        if (this.state === 'WARNING') {
            ctx.fillStyle = CONFIG.COLORS.BEAM;
            ctx.globalAlpha = (Math.sin(this.pulse) + 1) * 0.15;
            ctx.fillRect(this.x, 0, this.width, CONFIG.HEIGHT);
        } else if (this.state === 'FIRING') {
            ctx.shadowBlur = 30; ctx.shadowColor = CONFIG.COLORS.BEAM; ctx.fillStyle = CONFIG.COLORS.BEAM;
            ctx.fillRect(this.x, 0, this.width, CONFIG.HEIGHT);
            ctx.fillStyle = 'white'; ctx.globalAlpha = 0.4; ctx.fillRect(this.x + 15, 0, this.width - 30, CONFIG.HEIGHT);
        }
        ctx.restore();
    }
}

/** * CORE ENGINE
 */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score-val");
const levelEl = document.getElementById("level-val");
const menuEl = document.getElementById("start-menu");
const uiLayer = document.getElementById("ui-layer");

canvas.width = CONFIG.WIDTH;
canvas.height = CONFIG.HEIGHT;

let player = new Player();
let objects = [];
let beams = [];
let particles = [];
let lastTime = performance.now();
let gameState = 'MENU';
let score = 0;
let level = 1;
let spawnTimer = 0;
let shakeAmount = 0;
let chromaticAberration = 0;

const TIMERS = { beam: 0, stalker: 0, rainbow: 0, star: 0 };

function createExplosion(x, y, color, count = 20, speed = 5) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const s = Math.random() * speed + 1;
        particles.push({
            x, y, vx: Math.cos(angle) * s, vy: Math.sin(angle) * s,
            life: 1.0, color, size: Math.random() * 4 + 1, gravity: 0.05
        });
    }
}

function updateScore(amount) {
    score += amount;
    scoreEl.textContent = Math.floor(score);
    scoreEl.classList.add('pop');
    setTimeout(() => scoreEl.classList.remove('pop'), 200);
}

function triggerBlast() {
    if (!player.isAlive || player.blasts <= 0 || gameState === 'PAUSED') return;
    player.blasts--;
    shakeAmount = 25;
    chromaticAberration = 15;
    SFX.play('blastExplosion');
    createExplosion(player.x + player.width/2, player.y, CONFIG.COLORS.BLAST, 50, 12);
    objects = objects.filter(obj => {
        if (obj.type === 'rainbow') return true;
        const dist = Math.hypot(obj.x - player.x, obj.y - player.y);
        if (dist < 300) {
            createExplosion(obj.x + obj.size/2, obj.y + obj.size/2, obj.color, 12);
            SFX.play('enemyVaporize', 0.2);
            updateScore(25);
            return false;
        }
        return true;
    });
}

function startGame() {
    SFX.init();
    SFX.play('click');
    menuEl.classList.add('hidden');
    uiLayer.classList.remove('hidden');
    resetGame();
}

function resetGame() {
    player = new Player();
    objects = [];
    beams = [];
    particles = [];
    score = 0;
    level = 1;
    spawnTimer = 0;
    shakeAmount = 0;
    chromaticAberration = 0;
    Object.keys(TIMERS).forEach(k => TIMERS[k] = 0);
    gameState = 'PLAYING';
    scoreEl.textContent = "0";
    levelEl.textContent = "1";
    lastTime = performance.now();
    SFX.play('click');
}

function togglePause() {
    SFX.play('pause');
    if (gameState === 'PLAYING') gameState = 'PAUSED';
    else if (gameState === 'PAUSED') gameState = 'PLAYING';
}

function update(dt) {
    if (gameState === 'PAUSED') return;
    if (shakeAmount > 0) shakeAmount -= dt * 60;
    if (chromaticAberration > 0) chromaticAberration -= dt * 40;
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= dt * 1.5; });
    particles = particles.filter(p => p.life > 0);
    if (gameState !== 'PLAYING') return;
    player.update(dt);
    const step = currentDiff === 'nightmare' ? 800 : 600;
    const currentLevel = Math.floor(score / step) + 1;
    if (currentLevel !== level) {
        level = currentLevel;
        levelEl.textContent = level;
        levelEl.classList.add('pop');
        SFX.play('levelUp');
        setTimeout(() => levelEl.classList.remove('pop'), 400);
    }
    const settings = DIFFICULTY_SETTINGS[currentDiff];
    spawnTimer += dt * 1000 * settings.spawnRateMult;
    const baseSpawnRate = Math.max(180, 1000 - (level * 40));
    if (spawnTimer > baseSpawnRate) {
        const r = Math.random(); let type = 'enemy';
        if (r < settings.powerUpChance) {
            const p = Math.random();
            if (p < 0.3) type = 'gold'; else if (p < 0.55) type = 'shield'; else if (p < 0.8) type = 'time'; else type = 'blast';
        } else if (level >= 2 && Math.random() < 0.15) type = 'ghost';
        objects.push(new FallingObject(type, 1 + (level - 1) * 0.14));
        spawnTimer = 0;
    }
    if (settings.starEnabled) {
        TIMERS.star += dt * 1000;
        if (TIMERS.star >= 60000) { objects.push(new FallingObject('star', 0.8)); TIMERS.star = 0; }
    }
    const timerTick = dt * 1000 * settings.spawnRateMult;
    if (level >= 3) { TIMERS.stalker += timerTick; if (TIMERS.stalker >= 18000) { objects.push(new FallingObject('stalker', 1.1)); TIMERS.stalker = 0; } }
    if (level >= 5) { TIMERS.beam += timerTick; if (TIMERS.beam >= 9000) { beams.push(new BeamCube()); TIMERS.beam = 0; } }
    if (level >= 7) { TIMERS.rainbow += timerTick; if (TIMERS.rainbow >= 15000) { objects.push(new FallingObject('rainbow', 0.9)); TIMERS.rainbow = 0; } }
    beams.forEach(b => { b.update(dt); if (b.state === 'FIRING') { shakeAmount = Math.max(shakeAmount, 5); if (player.x + player.width > b.x && player.x < b.x + b.width && player.starTimer <= 0) killPlayer(); } });
    beams = beams.filter(b => b.state !== 'DONE');
    objects.forEach(obj => obj.update(dt, player, player.timeWarpTimer > 0));
    objects = objects.filter(obj => {
        if (obj.collides(player)) {
            const isEnemy = ['enemy', 'ghost', 'stalker', 'rainbow'].includes(obj.type);
            if (isEnemy) {
                if (player.starTimer > 0) {
                    createExplosion(obj.x + obj.size/2, obj.y + obj.size/2, obj.color === 'linear' ? '#fff' : obj.color);
                    SFX.play('enemyVaporize', 0.3);
                    updateScore(100); return false;
                } else if (player.hasShield) {
                    player.hasShield = false; player.shieldTimer = 0; shakeAmount = 10; chromaticAberration = 8;
                    SFX.play('shieldBreak');
                    createExplosion(obj.x + obj.size/2, obj.y + obj.size/2, obj.color === 'linear' ? '#fff' : obj.color);
                    return false;
                } else { killPlayer(); return true; }
            } else {
                if (obj.type === 'shield') { player.hasShield = true; player.shieldTimer = 8; SFX.play('shieldActivation'); }
                if (obj.type === 'time') { player.timeWarpTimer = 6; SFX.play('timeActivation'); }
                if (obj.type === 'gold') { updateScore(300); SFX.play('scoreGain', 0.4); }
                if (obj.type === 'blast') { player.blasts++; SFX.play('blastPickup'); }
                if (obj.type === 'star') { player.starTimer = 30; SFX.play('starPickup'); SFX.play('starActivation'); }
                createExplosion(obj.x + obj.size/2, obj.y + obj.size/2, obj.color, 15);
                return false;
            }
        }
        if (obj.y > CONFIG.HEIGHT) { if (['enemy', 'ghost', 'stalker', 'rainbow'].includes(obj.type)) updateScore(10); return false; }
        return true;
    });
}

function killPlayer() {
    player.isAlive = false;
    gameState = 'GAMEOVER';
    shakeAmount = 40;
    chromaticAberration = 30;
    SFX.play('universalDeath');
    SFX.stopLoop('shieldAmbient');
    SFX.stopLoop('starAmbient');
    SFX.stopLoop('timeAmbient');
    createExplosion(player.x + player.width/2, player.y + player.height/2, CONFIG.COLORS.PLAYER, 80, 18);
}

function draw() {
    renderScene(ctx, 0, 0);
    if (chromaticAberration > 1) {
        ctx.save(); ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = 0.5;
        renderScene(ctx, chromaticAberration, 0, 'red'); renderScene(ctx, -chromaticAberration, 0, 'blue');
        ctx.restore();
    }
}

function renderScene(targetCtx, offsetX, offsetY, tintColor) {
    targetCtx.save(); targetCtx.translate(offsetX, offsetY);
    if (shakeAmount > 0) targetCtx.translate(Math.random() * shakeAmount - shakeAmount/2, Math.random() * shakeAmount - shakeAmount/2);
    if (!tintColor) {
        targetCtx.fillStyle = currentDiff === 'nightmare' ? '#1a0000' : '#070708';
        targetCtx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
        targetCtx.strokeStyle = currentDiff === 'nightmare' ? 'rgba(255, 0, 0, 0.08)' : 'rgba(0, 255, 255, 0.04)';
        targetCtx.lineWidth = 1;
        for(let i=0; i<CONFIG.WIDTH; i+=40) { targetCtx.beginPath(); targetCtx.moveTo(i,0); targetCtx.lineTo(i,CONFIG.HEIGHT); targetCtx.stroke(); }
        for(let i=0; i<CONFIG.HEIGHT; i+=40) { targetCtx.beginPath(); targetCtx.moveTo(0,i); targetCtx.lineTo(CONFIG.WIDTH,i); targetCtx.stroke(); }
    }
    if (gameState !== 'MENU') { beams.forEach(b => b.draw(targetCtx)); player.draw(targetCtx); objects.forEach(obj => obj.draw(targetCtx)); }
    particles.forEach(p => { targetCtx.globalAlpha = p.life; targetCtx.fillStyle = tintColor || p.color; targetCtx.fillRect(p.x, p.y, p.size, p.size); });
    targetCtx.restore();
    if (!tintColor) {
        if (gameState === 'PAUSED') {
            targetCtx.fillStyle = "rgba(0,0,0,0.7)"; targetCtx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
            targetCtx.textAlign = "center"; targetCtx.fillStyle = "#00ffff"; targetCtx.font = "bold 28px 'Segoe UI'";
            targetCtx.fillText("PAUSE_ACTIVE", CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2);
        }
        if (gameState === 'GAMEOVER') {
            targetCtx.fillStyle = "rgba(2,2,4,0.9)"; targetCtx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
            targetCtx.textAlign = "center"; targetCtx.fillStyle = CONFIG.COLORS.ENEMY; targetCtx.font = "black 32px 'Segoe UI'";
            targetCtx.fillText("SESSION_TERMINATED", CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 40);
            targetCtx.fillStyle = "white"; targetCtx.font = "16px 'Segoe UI'";
            targetCtx.fillText(`FINAL_SCORE: ${Math.floor(score)}`, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 + 10);
            targetCtx.font = "bold 12px 'Segoe UI'"; targetCtx.globalAlpha = (Math.sin(Date.now()/200)+1)/2;
            targetCtx.fillText("PRESS 'R' TO REINITIALIZE", CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 + 70);
        }
    }
}

function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt); draw();
    requestAnimationFrame(loop);
}

window.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { if (gameState === 'MENU') startGame(); else togglePause(); return; }
    if (gameState === 'PLAYING') {
        if (e.key === "ArrowLeft" || e.key === "a") player.moveLeft = true;
        if (e.key === "ArrowRight" || e.key === "d") player.moveRight = true;
        if (e.key === " ") triggerBlast();
    }
    if (gameState === 'GAMEOVER' && (e.key.toLowerCase() === 'r' || e.key === ' ')) resetGame();
});

window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft" || e.key === "a") player.moveLeft = false;
    if (e.key === "ArrowRight" || e.key === "d") player.moveRight = false;
});

canvas.addEventListener("touchstart", (e) => {
    if (gameState === 'GAMEOVER') { resetGame(); return; }
    if (gameState === 'MENU') { startGame(); return; }
    if (gameState === 'PAUSED') { togglePause(); return; }
    const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    if (touchX < CONFIG.WIDTH / 2) player.moveLeft = true; else player.moveRight = true;
}, { passive: false });

canvas.addEventListener("touchend", () => { player.moveLeft = false; player.moveRight = false; });
requestAnimationFrame(loop);
</script>
